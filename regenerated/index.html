<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Regenerated Product Page</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div id="app" class="app" aria-live="polite">
      <main class="loading-shell">
        <p class="loading-title">Loading snapshot...</p>
        <p class="loading-detail">downloaded_json/coupang galaxy phone.json</p>
      </main>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

    <div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" hidden>
      <div class="modal-backdrop" data-action="close-modal"></div>
      <section class="modal-panel">
        <button class="icon-button modal-close" type="button" data-action="close-modal" aria-label="Close">x</button>
        <h2 id="modalTitle"></h2>
        <div id="modalBody" class="modal-body"></div>
      </section>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
