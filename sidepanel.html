<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bridge Page Snapshot</title>
    <link rel="stylesheet" href="sidepanel.css">
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <div>
          <h1>Page Snapshot</h1>
          <p>Extract the active page after you choose to inspect it.</p>
        </div>
      </header>

      <section class="controls" aria-label="Snapshot controls">
        <label class="option">
          <input id="includeScreenshot" type="checkbox">
          <span>Include visible screenshot</span>
        </label>

        <button id="extractButton" type="button">Extract current page</button>
      </section>

      <section id="statusPanel" class="statusPanel" aria-live="polite" aria-busy="false">
        <div id="loadingIndicator" class="loadingIndicator" hidden>
          <span class="spinner" aria-hidden="true"></span>
          <span id="loadingText">Preparing model request...</span>
        </div>
        <p id="status">Ready.</p>
      </section>

      <section class="summary" aria-label="Snapshot summary">
        <dl>
          <div>
            <dt>Text blocks</dt>
            <dd id="textCount">0</dd>
          </div>
          <div>
            <dt>Interactive</dt>
            <dd id="interactiveCount">0</dd>
          </div>
          <div>
            <dt>Forms</dt>
            <dd id="formCount">0</dd>
          </div>
          <div>
            <dt>Images</dt>
            <dd id="imageCount">0</dd>
          </div>
        </dl>
      </section>

      <section class="actions" aria-label="Snapshot actions">
        <button id="copyButton" type="button" disabled>Copy JSON</button>
        <button id="downloadButton" type="button" disabled>Download JSON</button>
      </section>

      <section class="patchPanel" aria-label="Live UI patch prototype">
        <div>
          <h2>Live UI patch</h2>
          <p>Build staged Gemini requests from the snapshot, then apply safe selector-based patch JSON to the live tab.</p>
        </div>

        <div class="workflowActions" aria-label="Staged AI patch workflow">
          <button id="pageAnalysisRequestButton" type="button" disabled>Build Page Analysis request</button>
          <button id="acceptPageAnalysisButton" type="button" disabled>Accept Page Analysis</button>
          <button id="strategyRequestButton" type="button" disabled>Build Strategy request</button>
          <button id="acceptStrategyButton" type="button" disabled>Accept Strategy</button>
          <button id="patchPlanRequestButton" type="button" disabled>Build Patch Plan request</button>
        </div>

        <div class="patchActions">
          <button id="geminiRequestButton" type="button" disabled>Legacy one-shot request</button>
          <button id="applyDemoPatchButton" type="button">Apply demo patch</button>
          <button id="applyPatchButton" type="button">Apply JSON patch</button>
          <button id="enforceSameTabButton" type="button">Keep actions in this tab</button>
          <button id="resetPatchButton" type="button">Reset patch</button>
        </div>
      </section>

      <textarea id="output" spellcheck="false" aria-label="Extracted snapshot JSON" placeholder="Snapshot JSON will appear here."></textarea>
    </main>

    <script src="sidepanel.js"></script>
  </body>
</html>
