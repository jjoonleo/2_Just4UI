<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bridge Guided Task Mode</title>
    <link rel="stylesheet" href="sidepanel.css">
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <div>
          <h1>Guided Task Mode</h1>
          <p>Follow step-by-step guidance on the original page.</p>
        </div>
      </header>

      <section class="sessionDashboard" aria-label="Guidance session" aria-live="polite">
        <div class="sessionDashboardHeader">
          <div>
            <h2>Guidance Session</h2>
            <p id="sessionStatusText">No guide is running.</p>
          </div>
          <span id="sessionStatusBadge" class="statusBadge noGuide">No guide</span>
        </div>

        <div id="guideActivity" class="guideActivity" hidden>
          <span class="spinner" aria-hidden="true"></span>
          <span id="guideActivityText">Preparing guide...</span>
        </div>

        <dl class="sessionDetails">
          <div>
            <dt>Task request</dt>
            <dd id="sessionTask">-</dd>
          </div>
          <div>
            <dt>Current step</dt>
            <dd id="sessionStep">-</dd>
          </div>
          <div>
            <dt>Last issue</dt>
            <dd id="sessionIssue">-</dd>
          </div>
        </dl>

        <button id="endGuideButton" class="secondaryAction" type="button" disabled>End guide</button>
      </section>

      <section class="guidePanel" aria-label="Guided task mode">
        <div>
          <h2>Guided Task Mode</h2>
          <p>Use the original page and show step-by-step guidance.</p>
        </div>

        <label class="field">
          <span>Provider</span>
          <select id="providerSelect">
            <option value="gemini">Gemini</option>
            <option value="openai">OpenAI</option>
          </select>
        </label>

        <label class="field">
          <span id="apiKeyLabel">Gemini API key</span>
          <input id="apiKeyInput" type="password" autocomplete="off" placeholder="AIza...">
        </label>

        <label class="field">
          <span>Model</span>
          <input id="modelInput" type="text" value="gemini-2.5-flash" autocomplete="off">
        </label>

        <label class="field">
          <span>Task request</span>
          <textarea id="taskRequestInput" spellcheck="true" placeholder="Example: Find the return policy, or help me buy this item with quantity 2."></textarea>
        </label>

        <div class="guideActions">
          <button id="startGuideButton" type="button">Start guide</button>
          <button id="clearKeyButton" type="button">Clear key</button>
        </div>
      </section>

      <section id="statusPanel" class="statusPanel" aria-live="polite" aria-busy="false">
        <div id="loadingIndicator" class="loadingIndicator" hidden>
          <span class="spinner" aria-hidden="true"></span>
          <span id="loadingText">Preparing model request...</span>
        </div>
        <p id="status">Ready.</p>
      </section>

    </main>

    <script src="sidepanel.js"></script>
  </body>
</html>
