<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bridge Page Snapshot</title>
    <link rel="stylesheet" href="sidepanel.css">
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <div>
          <h1>Page Snapshot</h1>
          <p>Extract the active page after you choose to inspect it.</p>
        </div>
      </header>

      <section class="controls" aria-label="Snapshot controls">
        <label class="option">
          <input id="includeScreenshot" type="checkbox">
          <span>Include visible screenshot</span>
        </label>

        <button id="extractButton" type="button">Extract current page</button>
      </section>

      <section class="guidePanel" aria-label="Guided task mode">
        <div>
          <h2>Guided Task Mode</h2>
          <p>Use the original page and show step-by-step guidance.</p>
        </div>

        <label class="field">
          <span>Provider</span>
          <select id="providerSelect">
            <option value="gemini">Gemini</option>
            <option value="openai">OpenAI</option>
          </select>
        </label>

        <label class="field">
          <span id="apiKeyLabel">Gemini API key</span>
          <input id="apiKeyInput" type="password" autocomplete="off" placeholder="AIza...">
        </label>

        <label class="field">
          <span>Model</span>
          <input id="modelInput" type="text" value="gemini-2.5-flash" autocomplete="off">
        </label>

        <label class="field">
          <span>Task request</span>
          <textarea id="taskRequestInput" spellcheck="true" placeholder="Example: Find the return policy, or help me buy this item with quantity 2."></textarea>
        </label>

        <div class="guideActions">
          <button id="startGuideButton" type="button">Start guide</button>
          <button id="clearKeyButton" type="button">Clear key</button>
        </div>
      </section>

      <section id="statusPanel" class="statusPanel" aria-live="polite" aria-busy="false">
        <div id="loadingIndicator" class="loadingIndicator" hidden>
          <span class="spinner" aria-hidden="true"></span>
          <span id="loadingText">Preparing model request...</span>
        </div>
        <p id="status">Ready.</p>
      </section>

      <section class="summary" aria-label="Snapshot summary">
        <dl>
          <div>
            <dt>Text blocks</dt>
            <dd id="textCount">0</dd>
          </div>
          <div>
            <dt>Interactive</dt>
            <dd id="interactiveCount">0</dd>
          </div>
          <div>
            <dt>Forms</dt>
            <dd id="formCount">0</dd>
          </div>
          <div>
            <dt>Images</dt>
            <dd id="imageCount">0</dd>
          </div>
        </dl>
      </section>

      <section class="actions" aria-label="Snapshot actions">
        <button id="copyButton" type="button" disabled>Copy JSON</button>
        <button id="downloadButton" type="button" disabled>Download JSON</button>
      </section>

      <textarea id="output" spellcheck="false" aria-label="Extracted snapshot JSON" placeholder="Snapshot JSON will appear here."></textarea>
    </main>

    <script src="sidepanel.js"></script>
  </body>
</html>
